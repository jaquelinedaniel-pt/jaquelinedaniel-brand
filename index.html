<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAQUELINE DANIEL | Objeto de Design</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Grotesk:wght@300&display=swap" rel="stylesheet">

<body class="loading">

    <div class="analog-grain"></div>

    <div class="metadata top-right">Status: Presença Autoral</div>

        <div class="portrait-container">

            <div class="scroll-hint">SCROLL // DESVENDAR</div>
        </div>
